<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--ow1:#FAFAF7;--ow2:#F4F3EE;--ow3:#ECEAE2;
--gold1:#C9A84C;--gold2:#B8922E;--gold3:#A07B1E;
--gold-light:#E8D08A;
--dark:#1E1A12;--text2:#6B6045;--text3:#A09878;--white:#FFFFFF;
}
html,body{height:100%}
body{font-family:'Nunito Sans',sans-serif;background:var(--ow1);color:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}

.card{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:0}

/* Foto */
.foto-wrap{position:relative;width:140px;height:140px;margin-bottom:24px}
.foto-wrap img{width:140px;height:140px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--gold-light);display:block}
.foto-placeholder{width:140px;height:140px;border-radius:50%;background:var(--ow3);border:2px solid var(--gold-light);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:11px;color:var(--text3);font-style:italic;text-align:center;padding:16px}
.foto-wrap::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid var(--gold1);opacity:0.5}

/* Nome e título */
.nome{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--dark);text-align:center;margin-bottom:6px}
.nome em{font-style:italic;color:var(--gold2)}
.titulo{font-family:'Nunito Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);font-weight:600;text-align:center;margin-bottom:8px}
.local{font-family:'Lora',serif;font-size:13px;color:var(--text3);font-style:italic;text-align:center;margin-bottom:32px}

/* Divider */
.divider{width:40px;height:1px;background:var(--gold1);margin-bottom:32px}

/* Slogan */
.slogan{font-family:'Lora',serif;font-size:15px;color:var(--text2);text-align:center;line-height:1.75;max-width:300px;margin-bottom:36px;font-style:italic}

/* Botões */
.btns{width:100%;display:flex;flex-direction:column;gap:12px}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--gold2);color:var(--white);padding:17px 24px;font-family:'Nunito Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;text-decoration:none;transition:background 0.3s;width:100%}
.btn-wa:hover{background:var(--gold3)}
.btn-wa svg{width:18px;height:18px;fill:white;flex-shrink:0}
.btn-site{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--gold2);color:var(--gold2);padding:16px 24px;font-family:'Nunito Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;text-decoration:none;transition:all 0.3s;width:100%;background:transparent}
.btn-site:hover{background:var(--gold2);color:var(--white)}
.btn-maps{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--ow3);color:var(--text2);padding:16px 24px;font-family:'Nunito Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;text-decoration:none;transition:all 0.3s;width:100%;background:var(--ow2)}
.btn-maps:hover{background:var(--ow3)}
.btn-maps svg{width:16px;height:16px;flex-shrink:0;stroke:var(--gold2)}
.btn-loja{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--dark);color:var(--dark);padding:16px 24px;font-family:'Nunito Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;text-decoration:none;transition:all 0.3s;width:100%;background:transparent}
.btn-loja:hover{background:var(--dark);color:var(--white)}
.btn-loja svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor}

/* Footer */
.footer-note{font-family:'Lora',serif;font-size:11px;color:var(--text3);font-style:italic;text-align:center;margin-top:28px}

/* Animação */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.foto-wrap{animation:fadeUp 0.5s ease both}
.nome{animation:fadeUp 0.5s 0.1s ease both}
.titulo{animation:fadeUp 0.5s 0.15s ease both}
.local{animation:fadeUp 0.5s 0.2s ease both}
.divider{animation:fadeUp 0.5s 0.25s ease both}
.slogan{animation:fadeUp 0.5s 0.3s ease both}
.btns{animation:fadeUp 0.5s 0.35s ease both}
.footer-note{animation:fadeUp 0.5s 0.4s ease both}</style>
</head>
